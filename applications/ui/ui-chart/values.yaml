# ============================================================================
# UI SERVICE - CUSTOM VALUES #
# ============================================================================
 
# ----------------------------------------------------------------------------
# IMAGE CONFIGURATION
# ----------------------------------------------------------------------------

image:
  repository: 788143860357.dkr.ecr.us-east-1.amazonaws.com/retail-store/ui
  pullPolicy: IfNotPresent
  tag: sha-91e3be8

containerPort: 8080

service:
  type: ClusterIP
  port: 80
  name: ui
  targetPort: 8080

serviceAccount:
  name: ui

probes:
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
    periodSeconds: 5

  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10

resources:
  requests:
    cpu: 256m
    memory: 512Mi

  limits:
    cpu: 512m
    memory: 1Gi

# ---------------------------------------------------------
# ConfigMap Values: endpoints:
# ---------------------------------------------------------
endpoints:
  RETAIL_UI_ENDPOINTS_CATALOG: http://catalog
  RETAIL_UI_ENDPOINTS_CARTS: http://carts
  RETAIL_UI_ENDPOINTS_CHECKOUT: http://checkout
  RETAIL_UI_ENDPOINTS_ORDERS: http://orders


autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  karpenter.sh/capacity-type: on-demand

affinity: {}

tolerations: []

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: ui

  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: ui

podDisruptionBudget:
  enabled: true
  minAvailable: 2

opentelemetry:
  enabled: true
  instrumentation: default-instrumentation
  